<section class="auth">
  <div class="auth__header">
    <h1>Welcome Back</h1>
    <p>Sign in to your Maison account</p>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          formControlName="email"
          class="input"
        />
        <div class="error" *ngIf="(email.touched || submitted()) && email.invalid">
          {{ email | formError: 'Email' }}
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password">
          <input
            #passwordInput
            id="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            formControlName="password"
            class="input"
          />
          <button
            class="password__toggle"
            [appTogglePassword]="passwordInput"
            aria-label="Show password"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5c5.5 0 9.7 5.2 10 6c-.3.8-4.5 6-10 6S2.3 11.8 2 11c.3-.8 4.5-6 10-6Zm0 2c-3.7 0-6.7 3-7.8 4c1.1 1 4.1 4 7.8 4s6.7-3 7.8-4c-1.1-1-4.1-4-7.8-4Zm0 1.5A2.5 2.5 0 1 1 9.5 11A2.5 2.5 0 0 1 12 8.5Z"
              />
            </svg>
          </button>
        </div>
        <div class="error" *ngIf="(password.touched || submitted()) && password.invalid">
          {{ password | formError: 'Password' }}
        </div>
      </div>

      <div class="row">
        <label class="check">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>
        <a class="link" routerLink="/forgot-password">Forgot password?</a>
      </div>

      <div class="server-error" *ngIf="serverError() as msg">{{ msg }}</div>

      <button class="btn btn--primary primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn btn--secondary social" type="button" (click)="googleSignIn()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#EA4335"
            d="M12 10.2v3.9h5.4c-.2 1.3-1.6 3.8-5.4 3.8a6.2 6.2 0 0 1 0-12.4c1.8 0 3 1 3.7 1.7l2.5-2.4C16.7 3.3 14.6 2.3 12 2.3a9.7 9.7 0 1 0 0 19.4c5.6 0 9.3-4 9.3-9.5c0-.6-.1-1.1-.2-1.6H12Z"
          />
          <path fill="#34A853" d="M3.9 7.7l3.2 2.3A6.1 6.1 0 0 1 12 5.5c1.8 0 3 1 3.7 1.7l2.5-2.4C16.7 3.3 14.6 2.3 12 2.3c-3.7 0-6.8 2.1-8.1 5.4Z" />
          <path fill="#FBBC05" d="M3 12a9.6 9.6 0 0 0 .9 4.3l3.2-2.5a6.1 6.1 0 0 1 0-3.8L3 12Z" />
          <path fill="#4285F4" d="M21.3 12.2c0-.6-.1-1.1-.2-1.6H12v3.9h5.4c-.2 1.3-1.6 3.8-5.4 3.8c-2.5 0-4.6-1.6-5.4-3.9l-3.2 2.5c1.7 3.3 5.1 5.5 8.6 5.5c5.6 0 9.3-4 9.3-9.2Z" />
        </svg>
        <span>Google</span>
      </button>

      <div class="bottom">
        <span>Don’t have an account?</span>
        <a routerLink="/register">Create one</a>
      </div>
    </form>
  </div>
</section>
