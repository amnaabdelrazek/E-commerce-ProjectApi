<div class="seller-wrapper">
  <aside [class.sidebar-open]="sidebarOpen" class="sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Seller Panel</h2>
      <button title="Toggle Sidebar" class="sidebar-toggle-mobile" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="/seller/dashboard" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">D</span>
            <span class="nav-text">Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/seller/products/new" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">P</span>
            <span class="nav-text">Add Product</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/seller/profile" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">P</span>
            <span class="nav-text">Profile</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/home" class="nav-link">
            <span class="nav-icon">H</span>
            <span class="nav-text">Back to Home</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ userName.charAt(0).toUpperCase() }}</div>
        <span class="user-name">{{ userName }}</span>
      </div>
      <button (click)="logout()" class="btn btn-logout">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="main-header">
      <button title="Toggle Sidebar" class="toggle-sidebar-btn" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h1 class="page-title">{{ pageTitle }}</h1>
      <div class="header-spacer"></div>
      <a class="header-profile-link" [routerLink]="profileRoute" aria-label="Open seller profile">
        <div class="header-profile-avatar">{{ userInitial }}</div>
        <span class="header-profile-name">{{ userName || 'Seller' }}</span>
      </a>
    </header>

    <div class="main-body">
      <router-outlet></router-outlet>
    </div>
  </main>

  <div class="sidebar-overlay" [class.show]="sidebarOpen" (click)="toggleSidebar()"></div>
</div>
