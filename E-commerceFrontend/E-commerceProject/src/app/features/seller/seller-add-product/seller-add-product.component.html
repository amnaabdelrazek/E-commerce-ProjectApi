<div class="add-container">
  <div class="form-card shadow-lg animated fadeIn">
    <div class="form-header">
      <h2>Create New Product</h2>
      <button class="close-btn" (click)="goBack()" type="button">×</button>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" formControlName="name" placeholder="e.g. Nordic Chair" class="form-control" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="4" placeholder="Write a short product description" class="form-control"></textarea>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select formControlName="categoryId" class="form-control">
          <option [ngValue]="0">Select category</option>
          <option *ngFor="let category of categories" [ngValue]="category.id">{{ category.name }}</option>
        </select>
        <small class="field-note" *ngIf="!isLoading && categories.length === 0">No categories available yet.</small>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Price (EGP)</label>
          <input type="number" formControlName="price" min="0" step="0.01" class="form-control" placeholder="0.00" />
        </div>

        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" formControlName="stockQuantity" min="0" step="1" class="form-control" placeholder="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Product Image</label>
        <input type="file" accept="image/*" class="form-control form-control--file" (change)="onImageSelected($event)" />
        <small class="field-note" *ngIf="imageFileName">Selected: {{ imageFileName }}</small>
      </div>

      <div class="form-error" *ngIf="productForm.invalid && productForm.touched">
        Please fill all required fields with valid values.
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="goBack()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="isLoading || isSubmitting">
          <div class="button-content">
            <span *ngIf="!isSubmitting">Create Product</span>
            <span *ngIf="isSubmitting" class="spinner"></span>
            <span *ngIf="isSubmitting">Processing...</span>
          </div>
        </button>
      </div>
    </form>
  </div>
</div>
